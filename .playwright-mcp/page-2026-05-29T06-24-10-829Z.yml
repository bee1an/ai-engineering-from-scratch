              - generic [ref=e87] [cursor=pointer]: They isolate dependencies so different projects don't conflict
              - generic [ref=e90] [cursor=pointer]: Python requires virtual environments to import packages
              - generic [ref=e93] [cursor=pointer]: Virtual environments provide GPU access
          - generic [ref=e94]:
