        - heading "The Problem" [level=2] [ref=e74]
        - paragraph [ref=e75]: You're about to learn AI engineering across 200+ lessons using Python, TypeScript, Rust, and Julia. If your environment is broken, every single lesson becomes a fight against tooling instead of learning.
